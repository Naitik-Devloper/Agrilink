<!DOCTYPE html>
<html lang="en">
<head>

   <style>
        .hero{
            background-image: url(login.png.jpeg);
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            flex-direction: column;           
            width: 100%;
            height:1000px;
            background-size: cover;
            margin-top:8%;
            gap: 0px;
        }
        .hero h1{
            font-size: 45px;
        }
        .hero h1,p{
          align-items: left;
          padding-left: 4%;
          
        } 
        #reg{
            border-radius: 15px;
        } 
       
         .heading{
            display: flex;
           
        }
         .navbar{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px;
            height: 60px; 
        } 
        #demo{
           color:white; 
           padding-bottom:50%;
        }
          .main-wrapper {
            display: flex;
            justify-content:center; 
            align-items: center;     
            padding: 20px;
            margin-left: 50%;
            margin-bottom:70%;
            border-radius: 10px;
        } 
        .child {
            
            width: 100%;
            max-width: 400px; 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
         
        #h1 {
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 28px;
        }

        
        .bot {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 25px;
        }
        .bot div {
            flex: 1;
        }

        .bot {
            width: 100%;
            height: 35px;
            gap: 15px;
            border: 0px;
            border-radius:10px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            
        }
       
        .input-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
           
        }
        .input-form input {
            width: 100%;
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        
        .submit-btn {
            width: 100%;
            height: 45px;
            border: 1px solid rgb(28, 172, 52);
            border-radius: 5px;
            cursor: pointer;
            font-weight:bold;
            transition: 0.2s;
        }
        #but1 {
            background-color:rgb(75, 220, 75);
            color: rgb(27, 25, 25);
            height:35PX;
        }
        #but1:hover {
            background-color:rgb(247, 250, 247);
        }
         .help {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: aliceblue;
            border-radius: 5px;
            width: 100%;
            margin-top: 15px;
        }
        .help i {
            font-size: 24px;
            color: green;
        }
        .help p {
            margin: 0;
            font-size: 13px;
            line-height: 1.4;
        }
        .parent{
            display:flex;
            justify-content: center;
            text-align: right;
            position: relative;
        }
        .p1{
            font-size: 550%;
            position: absolute;
            color: rgb(0, 80, 0);
            top: 60px;
            left: 100px;
        }
        .p2{
            font-size: 40px;
            position: absolute;
            color: rgb(1, 7, 1);
            left: 14%;
            top: 10%;
        }
        h3{
            position: absolute;
            top: 32%;
            left: 16%;
            color: rgb(17, 13, 13);
        }
        #pa{
            position: absolute;
            top: 85%;
            left: 15%;
            color: white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        #message{
            height:50px;
        }  
        .loco{           
            width: 390px;                      
            background-color: rgb(255, 255, 255);
            margin: 15px;
            border-radius:7px;
            border: 0px solid rgb(182, 179, 179);
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;           
        }

<body>

    </div>
