<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriLink Crop List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            background:#f5f7f5;
        }

        .navbar{
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .logo{
            color:green;
            font-weight:bold;
        }

        .card img{
            width:200px;
            height:150px;
            object-fit:cover;
        }

        .btn-success:hover{
            background:white;
            color:green;
            border:1px solid green;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white fixed-top">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="fa-brands fa-pagelines text-success fs-3 me-2"></i>
            <span class="logo">Agri</span><span>Link</span>
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Product</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Farmers</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Buyers</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About Us</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact Us</a>
                </li>
            </ul>

            <div>
                <button class="btn btn-success me-2">Login</button>
                <button class="btn btn-outline-success">Registration</button>
            </div>

        </div>
    </div>
</nav>

<!-- Main Section -->
<div class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-4">

                    <!-- Heading -->
                    <h2 class="text-center mb-4">
                        <i class="fa-brands fa-pagelines text-success me-2"></i>
                        List Crop
                    </h2>

                    <!-- Image Upload -->
                    <label class="form-label fw-bold">
                        <i class="fa-solid fa-image me-2"></i>
                        Crop Image
                    </label>

                    <div class="text-center border rounded p-3 mb-4">

                        <img src="img1.png"
                             class="img-fluid rounded mb-3"
                             alt="Crop">

                        <input type="file"
                               class="form-control"
                               accept=".jpg,.jpeg,.png">

                        <small class="text-muted">
                            Upload crop image (JPG, PNG)
                        </small>

                    </div>

                    <!-- Form -->
                    <form>

                        <div class="mb-3">
                            <label class="form-label">Crop Name</label>
                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter Crop Name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Quantity (100 kg)
                            </label>
                            <input type="number"
                                   class="form-control"
                                   placeholder="Enter Quantity">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                MSP (₹)
                            </label>
                            <input type="number"
                                   class="form-control"
                                   placeholder="Enter MSP">
                        </div>

                        <button class="btn btn-success w-100 py-2">
                            List Crop
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
