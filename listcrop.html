<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgriLink - List Crop</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    background:linear-gradient(to right,#f8fbf8,#e5fae7);
    font-family:"Segoe UI",sans-serif;
}

/* ================= NAVBAR ================= */

.navbar-custom{
    background:rgba(255,255,255,.95);
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    padding:10px 5%;
}

.logo-container{
    display:flex;
    align-items:center;
    gap:8px;
    color:green;
}

.logo-container h1{
    font-size:24px;
    margin:0;
    font-weight:bold;
}

.logo-container .bite{
    color:#333;
}

.navlink-custom .nav-link{
    margin:0 10px;
    color:#333 !important;
    font-weight:500;
}

.navlink-custom .nav-link:hover{
    color:green !important;
}

/* ================= FORM ================= */

.form-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:110px 20px 40px;
}

.main-card{
    width:100%;
    max-width:720px;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.card-body{
    padding:40px;
}

.heading{
    color:#2e7d32;
    font-size:34px;
    font-weight:700;
}

.icon{
    color:#198754;
}

.form-label{
    font-size:18px;
    font-weight:600;
}

.form-control{
    height:52px;
    border-radius:12px;
}

.form-control:focus{
    border-color:#198754;
    box-shadow:none;
}

.upload-box{
    border:1px solid #ddd;
    border-radius:15px;
    padding:18px;
    background:#fafafa;
}

.crop-img{
    width:150px;
    height:110px;
    object-fit:cover;
    border-radius:10px;
}

.upload-text{
    color:#666;
    font-size:14px;
}

.btn-success{
    height:50px;
    font-size:18px;
    border-radius:12px;
    font-weight:600;
}

.btn-success:hover{
    background:#fff;
    color:#198754;
    border:1px solid #198754;
}

/* Responsive */

@media(max-width:768px){

.card-body{
    padding:25px;
}

.heading{
    font-size:28px;
}

.crop-img{
    width:100%;
    height:180px;
    margin-bottom:15px;
}

}

</style>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-md navbar-custom fixed-top">
<div class="container-fluid px-0">

<a class="navbar-brand logo-container" href="#">
<i class="fa-brands fa-pagelines fa-xl"></i>

<div class="d-flex">
<h1>Agri</h1>
<h1 class="bite">Link</h1>
</div>
</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarAgriLink">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarAgriLink">

<div class="navbar-nav navlink-custom mx-auto">
<a class="nav-link active" href="#">Home</a>
<a class="nav-link" href="#">Product</a>
<a class="nav-link" href="#">Farmers</a>
<a class="nav-link" href="#">Buyers</a>
<a class="nav-link" href="#">About Us</a>
<a class="nav-link" href="#">Contact Us</a>
</div>

<div class="d-flex gap-2">
<button class="btn btn-sm">Login</button>

<button class="btn btn-outline-success btn-sm"
style="background:green;color:white;border:1px solid green;">
Registration
</button>

</div>

</div>

</div>
</nav>

<!-- ================= CARD ================= -->

<section class="form-section">

<div class="card main-card">

<div class="card-body">

<h2 class="text-center heading mb-4">
<i class="fa-solid fa-seedling"></i>
List Crop
</h2>

<hr>

<div class="mb-4">

<label class="form-label">
<i class="fa-regular fa-image icon"></i>
Crop Image
</label>

<div class="upload-box">

<div class="row align-items-center">

<div class="col-md-3 text-center">

<img src="cropimg.jpg" class="crop-img img-fluid">

</div>

<div class="col-md-9">

<input type="file" class="form-control">

<p class="upload-text mt-3 mb-0">
Upload crop image (JPG, PNG)
</p>

</div>

</div>

</div>

</div>

<div class="mb-4">

<label class="form-label">
<i class="fa-brands fa-envira icon"></i>
Crop Name
</label>

<input type="text"
class="form-control"
placeholder="Enter Crop Name">

</div>

<div class="mb-4">

<label class="form-label">
<i class="fa-solid fa-scale-balanced icon"></i>
Quantity (in 100 Kgs)
</label>

<input type="number"
class="form-control"
placeholder="Enter Quantity">

<small class="text-muted">
Example: 25 = 2500 Kgs
</small>

</div>

<div class="mb-4">

<label class="form-label">
<i class="fa-solid fa-indian-rupee-sign icon"></i>
MSP (Rupees)
</label>

<input type="number"
class="form-control"
placeholder="Enter MSP">

</div>

<button class="btn btn-success w-100">

<i class="fa-solid fa-file-circle-plus"></i>

List Crop

</button>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
