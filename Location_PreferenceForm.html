<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Modern high-definition aerial agricultural wallpaper with custom pan animation */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #0b0f11;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Animated Background Layer */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(10, 16, 13, 0.75), rgba(7, 10, 12, 0.88)), url('https://static.vecteezy.com/system/resources/previews/070/072/783/large_2x/aerial-view-of-green-agricultural-field-in-sunlight-cultivation-landscape-free-photo.jpg');
            background-size: cover;
            background-position: center;
           
        }

        @keyframes backgroundSlowPan {
            0% { transform: scale(1); background-position: center; }
            100% { transform: scale(1.08); background-position: top right; }
        }

        /* Sidebar Styling - Clean Charcoal Slate */
        .sb {
            background-color: rgba(18, 27, 19, 0.95) !important;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(9, 172, 50, 0.08) !important;
        }

        /* Sidebar dropdown modifications */
        .dropdown-toggle-sidebar {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .dropdown-menu-sidebar {
            background-color: #12181b !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .dropdown-item-sidebar {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .dropdown-item-sidebar:hover {
            background-color: #eab308 !important;
            color: #000000 !important;
            font-weight: 500;
        }

        /* Sidebar structural positions */
        @media (min-width: 992px) {
            .main-content-wrapper {
                margin-left: 260px !important;
                padding: 60px 30px !important;
            }
        }

        @media (max-width: 991.98px) {
            .main-content-wrapper {
                margin-left: 0px !important;
                padding: 90px 15px 40px 15px !important;
            }
        }

        /* ==========================================================================
           ATTRACTIVE NEW GOLD & EMERALD GLASSMORPHIC CARD
           ========================================================================== */
        
        .main-content-wrapper .card {
            background: rgba(18, 24, 27, 0.75) !important;
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6) !important;
            transform: translateY(20px);
            opacity: 0;
            animation: cardReveal 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes cardReveal {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Striking header using dark background with dual amber-emerald glow */
        .main-content-wrapper .card-header.bg-primary {
            background: rgba(24, 32, 36, 0.9) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding: 25px !important;
            position: relative;
        }

        /* Golden highlight stripe under header */
        .main-content-wrapper .card-header.bg-primary::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #eab308, #10b981, transparent);
        }

        /* Internal section blocks */
        .main-content-wrapper .bg-light {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            border-radius: 16px !important;
            padding: 22px !important;
            transition: all 0.3s ease;
        }

        .main-content-wrapper .bg-light:hover {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(234, 179, 8, 0.3) !important;
            transform: translateY(-2px);
        }

        /* Typography Color Modifications */
        .main-content-wrapper .text-primary {
            color: #eab308 !important; /* Golden Harvest title */
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(234, 179, 8, 0.2);
        }

        .main-content-wrapper .text-secondary,
        .main-content-wrapper .form-label {
            color: #f1f5f9 !important;
            font-weight: 500;
        }

        .main-content-wrapper .form-text, 
        .main-content-wrapper .text-muted {
            color: #94a3b8 !important;
        }

        /* Sophisticated Inputs */
        .main-content-wrapper .form-control,
        .main-content-wrapper .form-select {
            background-color: rgba(11, 15, 17, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #ffffff !important;
            border-radius: 12px !important;
            padding: 12px 16px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-content-wrapper .form-control:focus,
        .main-content-wrapper .form-select:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.2) !important;
            background-color: rgba(11, 15, 17, 0.95) !important;
        }

        .main-content-wrapper .form-select option {
            background-color: #12181b !important;
            color: #ffffff !important;
        }

        /* Modern Emerald Sourcing Button with smooth shine effect */
        .main-content-wrapper .btn-primary {
            background: linear-gradient(135deg, #059669, #10b981, #059669) !important;
            background-size: 200% auto !important;
            border: none !important;
            color: #ffffff !important;
            border-radius: 12px !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px;
            padding: 14px !important;
            transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .main-content-wrapper .btn-primary:hover {
            background-position: right center !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        .main-content-wrapper .btn-primary:active {
            transform: translateY(1px);
        }
    </style>
</head>
