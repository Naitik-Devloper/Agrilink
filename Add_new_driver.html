<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriLink - Driver Registry</title>

    <!-- Bootstrap 5 & FontAwesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-green: #2e7d32;
            --dark-bg: #1b5e20;
            --light-green: #e8f5e9;
            --bg-body: #f4f6f4;
            --text-dark: #333333;
        }

        body {
            background-color: var(--bg-body) !important;
            color: var(--text-dark) !important;
        }

        .sb {
            background-color: #1C3F24 !important;
        }

        /* Desktop Positioning layout */
        @media (min-width: 992px) {
            .main-content-wrapper {
                margin-left: 260px !important;
                padding: 30px !important;
                margin-top: 56px;
            }
        }

        /* Mobile Layout */
        @media (max-width: 991.98px) {
            .main-content-wrapper {
                margin-left: 0px !important;
                padding: 15px !important;
                margin-top: 56px;
            }
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-menu li a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            display: block;
            transition: all 0.3s ease;
        }

        .sidebar-menu li a:hover, .sidebar-menu li.active a {
            background-color: var(--primary-green);
            color: #ffffff;
            font-weight: 600;
        }

        .text-agri {
            color: var(--primary-green) !important;
        }

        /* Driver Profile Image Circular Frame */
        .driver-avatar {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--light-green);
        }
    </style>
</head>

<body>

    <!-- Fixed Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark fixed-top navbar-dark">
        <div class="container-fluid px-3 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-success d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mySidebar" aria-controls="mySidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a class="navbar-brand fw-bold text-success fs-3 d-flex align-items-center gap-2 m-0" href="#">
                <i class="fa-brands fa-pagelines"></i> AgriLink
            </a>
            </div>
            <div class="d-flex align-items-center ms-auto">
                <a class="nav-link text-success fs-4 p-2" href="home.html">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Sidebar Navigation Drawer -->
    <div class="offcanvas-lg offcanvas-start text-white border-end border-secondary p-4 shadow sb" id="mySidebar"
        style="width: 260px; min-height: 100vh; position: fixed; left: 0; z-index: 1000; top: 56px;">
        <div class="text-center">
            <div class="d-grid gap-2 text-start">
                <ul class="sidebar-menu p-0">
                    <li><a href="logistics_Dashboard.html">Logistics & Management</a></li>
                    <li class="active"><a href="demo.html"><label style="background-color: var(--primary-green)">
                    <i class="fa-solid fa-user-plus me-2"></i>Add New Driver
                    </label></a></li>
                    
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Dynamic Content Workspace Area -->
    <div class="main-content-wrapper flex-grow-1">
        <div class="container-fluid">
            
            <!-- Page Identity Header Area with Action Button -->
            <div class="header-title pt-4 mb-4 d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3">
                <div>
                    <h1 class="h2 text-agri fw-bold mb-1">Drivers & Fleet Management</h1>
                    <p class="text-muted mb-0">Manage registered driver profiles, contact credentials, and vehicle logs.</p>
                </div>
                <!-- Interactive Action Button to trigger collapse form -->
                <button class="btn btn-success fw-bold px-4 py-2 shadow-sm" style="background-color: var(--primary-green); border:none;" type="button">
                    <i class="fa-solid fa-user-plus me-2"></i>Add New Driver
                </button>
            </div>

            <!-- Collapsible Driver Registration Form (Hidden by default, slides down cleanly) -->
            <div class=" mb-4" id="addDriverForm">
                <div class="card p-4 border-light shadow-sm bg-white">
                    <div class="border-bottom pb-2 mb-4">
                        <h2 class="h5 text-agri fw-bold mb-1">Register New Logistics Driver</h2>
                        <p class="text-muted small mb-0">Fill out the credentials below to add a new driver and vehicle asset.</p>
                    </div>

                    <form action="#" method="POST" enctype="multipart/form-data">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="driverName" class="form-label fw-semibold text-dark small">Driver Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-user"></i></span>
                                    <input type="text" class="form-control text-dark" id="driverName" name="driverName" placeholder="Enter full name" required>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="mobileNo" class="form-label fw-semibold text-dark small">Mobile Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-phone"></i></span>
                                    <input type="tel" class="form-control text-dark" id="mobileNo" name="mobileNo" placeholder="Enter 10-digit number" pattern="[0-9]{10}" required>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="vehicleName" class="form-label fw-semibold text-dark small">Vehicle Name / Model</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-truck-front"></i></span>
                                    <input type="text" class="form-control text-dark" id="vehicleName" name="vehicleName" placeholder="e.g., Mahindra Bolero Pickup" required>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="vehicleNumber" class="form-label fw-semibold text-dark small">Vehicle Plate Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-id-card"></i></span>
                                    <input type="text" class="form-control text-dark" id="vehicleNumber" name="vehicleNumber" placeholder="e.g., MH-15-EX-4412" required>
                                </div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="driverPhoto" class="form-label fw-semibold text-dark small">Driver Profile Photo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-image"></i></span>
                                    <input type="file" class="form-control text-dark" id="driverPhoto" name="driverPhoto" accept="image/*" required>
                                </div>
                            </div>
                            <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                                <button type="reset" class="btn btn-light border text-muted px-4">Reset</button>
                                <button type="submit" class="btn btn-success px-4 fw-bold" style="background-color: var(--primary-green); border: none;">Submit Data</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
