<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer - Premium Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #feffff;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Sidebar Styling - Clean Charcoal Slate */
        .sb {
            background-color: #1C3F24!important;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(9, 172, 50, 0.08) !important;
        }

        /* Sidebar dropdown modifications */
        .dropdown-toggle-sidebar {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .dropdown-menu-sidebar {
            background-color: #12181b !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .dropdown-item-sidebar {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .dropdown-item-sidebar:hover {
            background-color: #eab308 !important;
            color: #000000 !important;
            font-weight: 500;
        }

        /* Sidebar structural positions */
        @media (min-width: 992px) {
            .main-content-wrapper {
                margin-left: 260px !important;
                padding: 60px 30px !important;
            }
        }

        @media (max-width: 991.98px) {
            .main-content-wrapper {
                margin-left: 0px !important;
                padding: 90px 15px 40px 15px !important;
            }
        }

        /* ==========================================================================
           ATTRACTIVE NEW GOLD & EMERALD GLASSMORPHIC CARD WITH ENTRY ANIMATION
           ========================================================================== */
        
        .main-content-wrapper .card {
            background:#feffff !important;
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15) !important;
            transform: translateY(30px);
            opacity: 0;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            margin-top: 30px;
        }

        @keyframes cardReveal {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Striking header with dual amber-emerald glow line */
        .main-content-wrapper .card-header {
            background: #feffff !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 25px !important;
            position: relative;
        }

        /* Golden highlight stripe under header */
        .main-content-wrapper .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #eab308, #10b981, transparent);
        }

        /* Form Block container styling */
        .main-content-wrapper .bg-light {
            background-color: rgba(5, 150, 105, 0.03) !important;
            border: 1px solid rgba(5, 150, 105, 0.08) !important;
            border-radius: 16px !important;
            padding: 22px !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .main-content-wrapper .bg-light:hover {
            border-color: rgba(234, 179, 8, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        /* Typography Color Modifications */
        .main-content-wrapper .text-primary {
            color: #10b981 !important; /* Premium Green */
            letter-spacing: 0.5px;
        }

        .main-content-wrapper .form-label {
            color: #1f2937 !important;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        /* Custom Input Fields with Focus glow animation */
        .main-content-wrapper .form-control,
        .main-content-wrapper .form-select {
            background-color: #feffff !important;
            border: 1.5px solid #d1d5db !important;
            color: #1f2937 !important;
            border-radius: 12px !important;
            padding: 12px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-content-wrapper .form-control:focus,
        .main-content-wrapper .form-select:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
            background-color: #feffff !important;
        }

        /* Floating label-like animation helpers when input changes */
        .form-group-animate:focus-within .form-label {
            color: #10b981 !important;
        }

        /* Modern Sourcing Button with animated gradient positioning */
        .main-content-wrapper .btn-primary {
            background: linear-gradient(135deg, #059669, #10b981, #059669) !important;
            background-size: 200% auto !important;
            border: none !important;
            color: #ffffff !important;
            border-radius: 12px !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px;
            padding: 14px !important;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
        }

        .main-content-wrapper .btn-primary:hover {
            background-position: right center !important;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        .main-content-wrapper .btn-primary:active {
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="text-white">

    <nav class="navbar navbar-expand-lg bg-dark fixed-top border-bottom border-secondary">
        <div class="container-fluid px-3 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-warning d-lg-none me-2" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#mySidebar" aria-controls="mySidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a class="navbar-brand fw-bold text-warning fs-3 d-flex align-items-center gap-2 m-0" href="#">
                    <i class="fa-brands fa-pagelines" style="color: #059669;"></i> <label class="text-success">AgriLink</label> 
                </a>
            </div>
            <div class="d-flex align-items-center ms-auto">
                <a class="nav-link text-light fs-4 p-2" href="home.html">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="offcanvas-lg offcanvas-start text-white p-4 shadow sb mt-4" id="mySidebar"
        style="width: 260px; min-height: 100vh; position: fixed; left: 0; z-index: 1000; top: 4%; color: #059669;">
        <div class="d-lg-none d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-warning fw-bold">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                data-bs-target="#mySidebar"></button>
        </div>
        <div class="text-center">
            <h6 class="text-uppercase text-muted fw-bold small mb-3" style="color:#eab308 !important"><i>Your Profile</i></h6>
            <div class="bg-black mx-auto border border-warning mb-2"
                style="width: 90px; height: 90px; border-radius: 50%; overflow: hidden;">
                <img src="naitik.jpeg" alt="Profile" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h5 class="fw-bold my-1">Naitik Lohakare</h5>
            <span class="badge bg-success">Farmer</span>
            <hr class="border-secondary my-4">
            <div class="d-grid gap-2 text-start">
                <div class="dropdown">
                    <a class="btn dropdown-toggle dropdown-toggle-sidebar text-start w-100 d-flex justify-content-between align-items-center"
                        href="F_Dashboard.html" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Dashboard
                    </a>
                    <ul class="dropdown-menu dropdown-menu-sidebar w-100">
                        <li><a class="dropdown-item dropdown-item-sidebar" href="#">Home</a></li>
                        <li><a class="dropdown-item dropdown-item-sidebar" href="#">My Listings</a></li>
                    </ul>
                </div>
                <a href="F_Dashboard_history.html" class="btn btn-outline-warning text-start border-0 text-white-50"><i
                        class="fa-solid fa-gear me-2"></i> History</a>
                <a href="#" class="btn btn-outline-warning text-start border-0 text-white-50"><i
                        class="fa-solid fa-gear me-2"></i> Edit Profile</a>
            </div>
        </div>
    </div>

    <div class="main-content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">

                    <!-- START OF THE FARMER CARD -->
                    <div class="card shadow border-0">
                        <!-- Card Header -->
                        <div class="card-header text-center">
                            <h5 class="card-title mb-0 fw-bold fs-4 text-success">New Produce Listing</h5>
                            <p class="small text-muted mb-0 mt-1">Publish your farm harvest to potential AgriLink buyers</p>
                        </div>

                        <!-- Card Body -->
                        <div class="card-body p-4">
                            <form>
                                <div class="bg-light mb-4">
                                    <!-- 1. Farmer Name Input -->
                                    <div class="mb-4 form-group-animate">
                                        <label for="farmerName" class="form-label mb-2">
                                            <i class="fa-solid fa-user me-2 text-warning"></i>Farmer's Name
                                        </label>
                                        <input type="text" class="form-control" id="farmerName" value="Naitik Lohakare" placeholder="Enter your full name" required>
                                    </div>

                                    <!-- 2. Crop Name Input -->
                                    <div class="mb-4 form-group-animate">
                                        <label for="cropName" class="form-label mb-2">
                                            <i class="fa-solid fa-wheat-awn me-2 text-warning"></i>Crop Name
                                        </label>
                                         <input type="text" class="form-control"   placeholder="Enter your crop name" required>

                                
                                    </div>

                                    <!-- 3. Crop Quantity Input -->
                                    <div class="mb-1 form-group-animate">
                                        <label for="quantity" class="form-label mb-2">
                                            <i class="fa-solid fa-weight-hanging me-2 text-warning"></i>Crop Quantity (Quintals)
                                        </label>
                                        <input type="number" class="form-control" id="quantity" value="1.0" min="0.5" step="0.5" required>
                                        <div class="form-text mt-2 text-muted">Adjusts in steps of 0.5 Quintals.</div>
                                    </div>
                                </div>

                                <!-- Animated Submit Button -->
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg fs-6 py-3">
                                        <i class="fa-solid fa-check-double me-2"></i>Publish Listing
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <!-- END OF THE CARD -->

                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
