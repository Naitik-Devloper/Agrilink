<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriLink - Admin Login</title>

    <!-- Bootstrap 5 CSS & FontAwesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #e8f5e9;
            --bg-body: #f4f6f4;
            --text-dark: #333333;
        }

        body {
            background-color: var(--bg-body) !important;
            color: var(--text-dark) !important;
            min-height: 100vh;
            margin-top: 50px;
        }

        .text-agri {
            color: var(--primary-green) !important;
        }

        .btn-agri {
            background-color: var(--primary-green) !important;
            border: none !important;
            color: white !important;
            transition: background-color 0.3s ease;
        }

        .btn-agri:hover {
            background-color: var(--dark-green) !important;
        }

        .login-card {
            border: none;
            border-radius: 12px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center py-5">

    <!-- Fixed Top Navbar Component -->
<nav class="navbar navbar-expand-lg bg-dark fixed-top navbar-dark" style="z-index: 1050;">
    <div class="container-fluid px-3 d-flex align-items-center justify-content-between">
        
        <!-- Left Side: Mobile Sidebar Toggle & Brand Identity -->
        <div class="d-flex align-items-center">
            <!-- Mobile Menu Bars Trigger (Visible only on screens smaller than 992px) -->
            <button class="btn btn-outline-success d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mySidebar" aria-controls="mySidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            
            <!-- AgriLink Platform Logo Link -->
            <a class="navbar-brand fw-bold text-success fs-3 d-flex align-items-center gap-2 m-0" href="#">
                <i class="fa-brands fa-pagelines"></i> AgriLink
            </a> 
        </div>

        <!-- Right Side: Navigation Actions / Utilities -->
        <div class="d-flex align-items-center ms-auto gap-2">
            <!-- Quick View Home Trigger Link -->
            <a class="nav-link text-success fs-4 p-2" href="home.html" title="Go to Homepage">
                <i class="fa-solid fa-house"></i>
            </a>
            
            <!-- User Status Indicator / Logout Option Dropdown -->
            
        </div>

    </div>
</nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                
                <!-- System Brand Header -->
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-success d-flex align-items-center justify-content-center gap-2 m-0 fs-2">
                       <a class="navbar-brand fw-bold text-success fs-3 d-flex align-items-center gap-2 m-0" href="#">
                <i class="fa-brands fa-pagelines"></i> AgriLink
            </a> 
                    </h1>
                    <p class="text-muted mt-2">Logistics & Supply Chain Management Portal</p>
                </div>

                <!-- Main Login Card Card Layout Box -->
                <div class="card p-4 shadow-sm bg-white login-card">
                    <div class="border-bottom pb-2 mb-4">
                        <h2 class="h4 fw-bold text-success mb-1 ">Admin Sign In</h2>
                        <p class="text-danger-emphasis small mb-0">Enter your official hub credentials to access the central control dashboard.</p>
                    </div>

                    <!-- Secure Submission Form -->
                    <form action="#" method="POST">
                        <div class="row g-3">
                            
                            <!-- Official Email Input Field -->
                            <div class="col-12">
                                <label for="loginEmail" class="form-label fw-semibold text-dark small">Official Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-envelope"></i></span>
                                    <input type="email" class="form-control text-dark" id="loginEmail" name="loginEmail" placeholder="admin@logistics.com" required>
                                </div>
                            </div>

                            <!-- Dashboard Password Input Field -->
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="loginPassword" class="form-label fw-semibold text-dark small mb-0">Security Password</label>
                                    <a href="#" class="text-agri text-decoration-none small fw-medium">Forgot Password?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control text-dark" id="loginPassword" name="loginPassword" placeholder="••••••••" required>
                                </div>
                            </div>

                            <!-- Session Controls (Remember Me Option) -->
                            <div class="col-12 my-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                                    <label class="form-check-label text-muted small" for="rememberMe">
                                        Keep me logged in on this machine
                                    </label>
                                </div>
                            </div>

                            <!-- Secure Authentication Submission Trigger -->
                            <div class="col-12 d-grid mt-3">
                                <button type="submit" class="btn btn-agri py-2.5 fw-bold shadow-sm">
                                    <i class="fa-solid fa-right-to-bracket me-2"></i>Authenticate & Enter
                                </button>
                            </div>

                        </div>
                    </form>

                    <!-- Bottom Registration Redirection Matrix -->
                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="text-muted small mb-0">New logistics partner? 
                            <a href="admin-register.html" class="text-agri fw-bold text-decoration-none">Register Hub Here</a>
                        </p>
                    </div>

                </div> <!-- End Login Card -->

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Compiled Bundle JS Component -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
